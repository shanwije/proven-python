# Copy this to your project as .github/workflows/ci.yml.
# It runs the full proven-python toolchain on every push and pull request, across a matrix of
# current Python versions, using uv for fast reproducible installs. A red check blocks the
# merge, which is the point: the build enforces the standards no matter what any contributor
# or tool does locally.

name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy --strict)
        run: uv run mypy --strict src tests

      - name: Tests (pytest with coverage)
        run: uv run pytest

      # Optional: enforce module boundaries on a multi-module project. Run `tach init` once to
      # create tach.toml, then uncomment. Pin the version, because Tach is pre-1.0.
      # - name: Architecture (tach check)
      #   run: uvx tach@0.35.0 check
